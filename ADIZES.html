<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WEMPACT | אבחון סגנונות ניהול אדיג'ס</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wempact-dark: #050a1b; 
            --wempact-blue: #185adb;
            --wempact-orange: #FF8C00;
            --white: #ffffff;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(135deg, #050a1b, #0c1b3d);
            margin: 0; padding: 0; color: #333; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }

        .top-logo { position: fixed; top: 15px; left: 15px; text-align: left; color: white; z-index: 1000; }
        .logo-main { font-weight: bold; font-size: 1.1em; letter-spacing: 1px; }

        .card {
            background: var(--white); width: 92%; max-width: 550px; padding: 25px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: right; position: relative; box-sizing: border-box; margin: 20px auto;
        }

        .progress-container { width: 100%; height: 6px; background: #eee; margin-bottom: 25px; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--wempact-blue); width: 0%; transition: 0.3s; }

        h2 { color: var(--wempact-dark); font-size: 1.4rem; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Assistant'; font-size: 1rem; }

        .btn { background: var(--wempact-blue); color: white; border: none; padding: 14px; border-radius: 30px; cursor: pointer; font-size: 1.1rem; font-weight: 600; display: block; margin: 10px auto; width: 100%; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .btn-secondary { background: #f0f0f0; color: #555; font-size: 0.95rem; }

        .option-item { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .option-text { font-size: 0.9rem; line-height: 1.3; flex: 1; }
        
        select { padding: 8px; border-radius: 6px; border: 2px solid var(--wempact-blue); font-weight: bold; color: var(--wempact-blue); background: white; width: 65px; font-size: 1rem; }

        .result-box { background: #f0f4ff; padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; border-right: 4px solid var(--wempact-blue); }
        .score-val { font-weight: 800; color: var(--wempact-blue); }

        #loginPage, #introPage, #surveyPage, #finishBanner, #resultsPage { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body>

    <div class="top-logo"><div class="logo-main">WEMPACT</div></div>

    <div id="loginPage" class="card active">
        <h2>שלום רב</h2>
        <p>לפניך שאלון לאבחון סגנונות ניהול (אדיג'ס).</p>
        <input type="text" id="userName" placeholder="שם מלא">
        <input type="password" id="entryCode" placeholder="קוד כניסה">
        <button class="btn" onclick="validateLogin()">מתחילים</button>
    </div>

    <div id="introPage" class="card">
        <h2 id="welcomeMsg"></h2>
        <p>דרג כל היגד בערכים: 8 (הכי מתאים), 4, 2, 1 (הכי פחות).</p>
        <button class="btn" onclick="startSurvey()">הבנתי, בואו נתחיל</button>
    </div>

    <div id="surveyPage" class="card">
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <h3 id="questionTitle"></h3>
        <div id="adizesOptions"></div>
        <button class="btn" onclick="nextStep()">המשך</button>
    </div>

    <div id="finishBanner" class="card" style="text-align: center;">
        <h2>כל הכבוד!</h2>
        <button id="resBtn" class="btn" onclick="showResults()">לתוצאות 😊</button>
    </div>

    <div id="resultsPage" class="card">
        <h2 id="finalGreeting"></h2>
        <div id="resultsContent"></div>
    </div>

</body>
</html>
